name: Minecraft Runtime Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0

      - name: Setup JDK 25
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Build with Gradle
        run: chmod u+x ./gradlew && ./gradlew build --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: 'artifact'
          path: build/libs/*
          retention-days: 1
          compression-level: 9

  client-test:
    name: Client Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: 'artifact'
          path: artifacts

      - name: Stage mods for client test
        run: |
          mkdir -p run/mods
          cp artifacts/*.jar run/mods

      - name: Run Minecraft client test
        uses: headlesshq/mc-runtime-test@4.4.0
        with:
          mc: 1.21.1
          modloader: neoforge
          regex: .*neo.*
          java: 21
          mc-runtime-test: neoforge

  server-test:
    name: Server Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: 'artifact'
          path: artifacts

      - name: Stage mods for client test
        run: |
          mkdir -p run/mods
          cp artifacts/*.jar run/mods

      - name: Run Minecraft client test
        uses: headlesshq/mc-server-test@1.1.1
        with:
          mc: 1.21.1
          modloader: neoforge
          java: 21
