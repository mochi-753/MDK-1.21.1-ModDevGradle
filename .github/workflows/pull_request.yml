name: Create Pull request

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create Pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr create --base main --head develop --title "Release ${{ github.ref_name }}" --body "Auto created PR from tag ${{ github.ref_name }}"
