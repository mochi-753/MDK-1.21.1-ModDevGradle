name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: chmod u+x ./gradlew && ./gradlew build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: 'Jars'
          path: build/libs/*.jar
          retention-days: 1

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: build/libs/*.jar

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get tags
        id: tag
        run: |
          git fetch origin main --tags
          
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -A1 "^$LATEST_TAG$" | tail -n1)
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate a changelog
        run: |
          if [ -z "${{ steps.tag.outputs.previous_tag }}" ]; then
            echo "First release" > CHANGELOG.md
          else
            git-cliff --verbose --output CHANGELOG.md --strip all -- ${{ steps.tag.outputs.previous_tag }}..HEAD
          fi

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: 'Jars'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/requirements.txt

      - name: Create GitHub releases
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          files: '*.jar'
          name: '${{ github.event.repository.name }} ${{ steps.tag.outputs.latest_tag }}'
          tag_name: ${{ steps.tag.outputs.latest_tag }}

      - name: Create Modrinth release
        if: vars.MODRINTH_PROJECT_ID != ''
        env:
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          VERSION: ${{ steps.tag.outputs.latest_tag }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
        run: python .github/workflows/release_modrinth.py
