name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: chmod u+x ./gradlew && ./gradlew build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: 'Jars'
          path: build/libs/*.jar
          retention-days: 7

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: build/libs/*.jar

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get tags
        id: tag
        run: |
          git fetch origin main --tags
          
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -A1 "^$LATEST_TAG$" | tail -n1)
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: 'Jars'

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate a changelog
        run: git-cliff --verbose --output CHANGELOG.md --strip all ${{ steps.tag.outputs.previous_tag }}..HEAD

      - name: Create GitHub releases
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          files: '*.jar'
          tag_name: '${{ github.event.repository.name }} ${{ steps.tag.outputs.latest_tag }}'
