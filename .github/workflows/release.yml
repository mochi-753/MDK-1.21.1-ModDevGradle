name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        default: 'release'
        description: 'The release channel for this version'
        required: true
        type: choice
        options:
          - 'release'
          - 'beta'
          - 'alpha'
      create-github-release:
        default: true
        description: 'Create a GitHub release?'
        required: false
        type: boolean
      create-curseforge-release:
        default: false
        description: 'Create a CurseForge release?'
        required: false
        type: boolean
      create-modrinth-release:
        default: false
        description: 'Create a Modrinth release?'
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: chmod u+x ./gradlew && ./gradlew build --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: 'artifact'
          path: build/libs/*
          retention-days: 1

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: build/libs/*

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: inputs.create-github-release || inputs.create-curseforge-release || inputs.create-modrinth-release
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: 'artifact'

      - name: Get mod metadata
        id: metadata
        run: |
          echo "mod_id=$(jq -r '.modID' metadata.json)" >> "$GITHUB_OUTPUT"
          echo "mod_name=$(jq -r '.modName' metadata.json)" >> "$GITHUB_OUTPUT"
          echo "mod_version=$(jq -r '.modVersion' metadata.json)" >> "$GITHUB_OUTPUT"
          echo "curseforge_project_id=$(jq -r '.curseForgeProjectID' metadata.json)" >> "$GITHUB_OUTPUT"
          echo "modrinth_project_id=$(jq -r '.modrinthProjectID' metadata.json)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create release tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          RELEASE_TAG="v${{ steps.metadata.outputs.mod_version }}"
          
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG" HEAD
          git push origin "$RELEASE_TAG"
          
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate a changelog
        run: |
          if [ -z "${{ steps.tag.outputs.previous_tag }}" ]; then
            echo "First release" > CHANGELOG.md
          else
            git-cliff --verbose --output CHANGELOG.md --strip all -- ${{ steps.tag.outputs.previous_tag }}..${{ steps.tag.outputs.release_tag }}
          fi

      - name: Verify attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for jar in *.jar; do
            gh attestation verify "$jar" --repo "${{ github.repository }}"
          done
          
          cat >> CHANGELOG.md << 'EOF'
          
          ## ✅ Artifact Attestation
          
          The release JARs have been automatically verified by this project's GitHub Actions workflow using GitHub Artifact Attestations, confirming that they are authentic artifacts produced by the official CI pipeline.
          EOF

      - name: Setup Python
        if: inputs.create-curseforge-release || inputs.create-modrinth-release
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        if: inputs.create-curseforge-release || inputs.create-modrinth-release
        run: |
          python -m pip install --upgrade pip
          pip install -r src/main/python/requirements.txt

      - name: Create GitHub release
        if: inputs.create-github-release && inputs.release-type == 'release'
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          files: '*.jar'
          make_latest: true
          name: "${{ steps.metadata.outputs.mod_name }} ${{ steps.tag.outputs.release_tag }}"
          tag_name: ${{ steps.tag.outputs.release_tag }}

      - name: Create GitHub release (PreRelease)
        if: inputs.create-github-release && (inputs.release-type == 'beta' || inputs.release-type == 'alpha')
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          files: '*.jar'
          name: "${{ steps.metadata.outputs.mod_name }} ${{ steps.tag.outputs.release_tag }}"
          prerelease: true
          tag_name: ${{ steps.tag.outputs.release_tag }}

      - name: Create CurseForge release
        env:
          MOD_NAME: ${{ steps.metadata.outputs.mod_name }}
          MOD_VERSION: ${{ steps.tag.outputs.release_tag }}
          RELEASE_TYPE: ${{ inputs.release-type }}
          CURSEFORGE_PROJECT_ID: ${{ steps.metadata.outputs.curseforge_project_id }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        if: inputs.create-curseforge-release && env.CURSEFORGE_PROJECT_ID != '' && env.CURSEFORGE_TOKEN != ''
        run: python src/main/python/release-curseforge.py

      - name: Create Modrinth release
        env:
          MOD_NAME: ${{ steps.metadata.outputs.mod_name }}
          MOD_VERSION: ${{ steps.tag.outputs.release_tag }}
          RELEASE_TYPE: ${{ inputs.release-type }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ steps.metadata.outputs.modrinth_project_id }}
          REPOSITORY: ${{ github.repository }}
        if: inputs.create-modrinth-release && env.MODRINTH_PROJECT_ID != '' && env.MODRINTH_TOKEN != ''
        run: python src/main/python/release-modrinth.py
